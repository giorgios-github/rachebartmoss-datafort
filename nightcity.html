<style>
@font-face {
  font-family: "Eurostile";
  src:
    url("EurostileExtendedBlack.ttf") format("truetype");
}
@font-face {
  font-family: "Terminal Grotesque";
  src:
    url("terminal-grotesque.ttf") format("truetype");
}
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg1:#fff;--bg2:#fff;--text:#111;--text2:#666;--head:'Eurostile',sans-serif;--mono:'Space Mono',monospace}
body{font-family:var(--mono);background:var(--bg);color:var(--text);font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}

#nav{background:#111;padding:0 16px;display:flex;align-items:center;height:44px;flex-shrink:0}
#nav h1{font-family:var(--head);color:#fff;font-size:18px;font-weight:500;letter-spacing:4px;margin-right:16px}
#nav .sub{color:#888;font-size:11px;letter-spacing:2px}
#nav .back{color:#888;font-size:11px;text-decoration:none;margin-left:auto;border:1px solid #555;padding:3px 10px}
#nav .back:hover{color:#fff;border-color:#fff}

#app{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{width:280px;min-width:280px;background:var(--bg1);border-left:2px solid #111;display:flex;flex-direction:column;overflow:hidden;transition:width .16s ease,min-width .16s ease}
#app.nc-side-collapsed #sidebar{width:0;min-width:0;border-left:none}
#nc-side-toggle{flex:0 0 auto;width:14px;align-self:stretch;border:none;background:#111;color:#999;cursor:pointer;font-family:var(--mono);font-size:12px;padding:0}
#nc-side-toggle:hover{color:#fff}
#sidebar-head{background:#111;color:#fff;font-family:var(--head);font-size:13px;letter-spacing:3px;padding:8px 12px;cursor:pointer}
#sidebar-head:hover{background:#333}
#district-list{overflow-y:auto;flex:1}
.dist-item{padding:8px 12px;border-bottom:1px solid #ddd;cursor:pointer;display:flex;align-items:center;gap:8px}
.dist-item:hover{background:var(--bg2)}
.dist-item.active{background:#111;color:#fff}
.dist-item .di-code{font-family:var(--head);font-size:14px;font-weight:500;width:28px;flex-shrink:0}
.dist-item .di-name{font-size:11px;flex:1}
.dist-item .di-count{font-size:9px;color:var(--text2)}
.dist-item.active .di-count{color:#888}

/* MAIN AREA */
#content{flex:1;overflow:auto;padding:0}

/* OVERVIEW MAP */
#overview{padding:20px}
#overview h2{font-family:var(--head);font-size:20px;letter-spacing:3px;margin-bottom:16px;padding-bottom:6px}
#map-container{position:relative;display:inline-block;max-width:100%;cursor:pointer}
#map-img{display:block;width:100%;max-width:900px}
#map-hover-label{position:absolute;pointer-events:none;background:#111;color:#fff;font-family:var(--head);font-size:14px;letter-spacing:2px;padding:4px 10px;display:none;white-space:nowrap;z-index:10}
#grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.grid-cell{border:2px solid #111;padding:10px 8px;cursor:pointer;min-height:80px;display:flex;flex-direction:column;justify-content:center;position:relative}
.grid-cell:hover{background:#111;color:#fff}
.grid-cell .gc-code{font-family:var(--head);font-size:16px;font-weight:500;letter-spacing:1px}
.grid-cell .gc-name{font-size:10px;margin-top:2px}
.grid-cell .gc-desc{font-size:9px;color:var(--text2);margin-top:3px}
.grid-cell:hover .gc-desc{color:#aaa}

/* DISTRICT VIEW */
#district-view{display:none;padding:20px}
#dv-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;border-bottom:3px solid #111;padding-bottom:12px}
#dv-header .dv-code{font-family:var(--head);font-size:36px;font-weight:500;line-height:1}
#dv-header .dv-info{flex:1}
#dv-header .dv-name{font-family:var(--head);font-size:22px;letter-spacing:2px}
#dv-header .dv-intro{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
#dv-header .dv-sec{font-size:10px;margin-top:4px}

/* Search & Filter */
#loc-controls{display:flex;gap:8px;margin-bottom:12px;align-items:center}
#loc-search{background:#fff;border:2px solid #111;font-family:var(--mono);font-size:11px;padding:4px 8px;width:250px}
#loc-search:focus{outline:none;border-color:#555}
#loc-count{font-size:10px;color:var(--text2)}

/* Tabs */
.dv-tabs{display:flex;gap:0;margin-bottom:0}
.dv-tab{font-family:var(--head);font-size:12px;letter-spacing:2px;padding:6px 14px;border:2px solid #111;border-bottom:none;cursor:pointer;color:var(--text2);text-transform:uppercase}
.dv-tab.active{background:#111;color:#fff}
.dv-tab:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Overview tab */
#tab-overview{border:2px solid #111;border-top:none;padding:16px}
.dv-banner{width:100%;display:block;margin-bottom:16px;border-bottom:2px solid #111}
.ov-section{margin-bottom:20px}
.ov-section-title{font-family:var(--head);font-size:12px;letter-spacing:3px;border-bottom:2px solid #111;padding-bottom:4px;margin-bottom:10px}
.enc-item{padding:6px 0;border-bottom:1px solid #eee;font-size:11px;display:flex;gap:8px}
.enc-num{font-family:var(--head);font-weight:500;width:20px;flex-shrink:0;text-align:right}
.person-card{border:2px solid #111;margin-bottom:6px;padding:8px 10px;background:#fff}
.person-name{font-family:var(--head);font-size:13px;font-weight:500;letter-spacing:1px}
.person-desc{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.5}
.ov-empty{font-size:11px;color:var(--text2);font-style:italic}

/* Map tab */
#tab-map{border:2px solid #111;border-top:none;display:none}
#tab-map.active{display:flex}
.map-img-wrap{width:50%;flex-shrink:0;border-right:2px solid #111;min-height:300px;background:#f8f8f8}
.map-img-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.map-img-missing{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);font-style:italic;padding:20px}
.map-legend{width:50%;overflow-y:auto;max-height:calc(100vh - 180px);padding:12px}
.map-legend-title{font-family:var(--head);font-size:11px;letter-spacing:3px;margin-bottom:10px;border-bottom:1px solid #ccc;padding-bottom:4px}
.legend-item{border-bottom:1px solid #eee;cursor:pointer}
.legend-item:hover .legend-head{background:#f5f5f5}
.legend-head{display:flex;gap:8px;align-items:center;padding:5px 0}
.legend-num{font-family:var(--head);font-size:8px;font-weight:500;width:18px;height:18px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.legend-name{font-family:var(--head);font-size:11px;letter-spacing:1px;line-height:1.4;flex:1}
.legend-desc{font-size:11px;color:var(--text2);line-height:1.6;padding:0 0 6px 30px;display:none}
.legend-item.open .legend-desc{display:block}
</style>

          <div id="map-hover-label"></div>

      </div>
      <div id="view-grid" style="display:none">
        <div id="grid"></div>
      </div>
      <div id="view-atlas">

      </div>
    </div>
    <div id="district-view">
      <div id="dv-header">
        <div class="dv-code" id="dv-code"></div>
        <div class="dv-info">
          <div class="dv-name" id="dv-name"></div>
          <div class="dv-intro" id="dv-intro"></div>
          <div class="dv-sec" id="dv-sec"></div>
        </div>
      </div>
      <div class="dv-tabs">
        <div class="dv-tab active" data-tab="overview" onclick="switchTab('overview')">Overview</div>
        <div class="dv-tab" data-tab="map" onclick="switchTab('map')">Map</div>
        <div class="dv-tab" data-tab="other" onclick="switchTab('other')" style="display:none">Other</div>
      </div>
      <div id="tab-overview" class="tab-content active">

        </div>
        <div class="ov-section" id="ov-contacts">

          <div id="con-list"></div>
        </div>
        <div class="ov-section" id="ov-personalities">
          <div class="ov-section-title">PERSONALITIES</div>
          <div id="per-list"></div>
        </div>
      </div>
      <div id="tab-map" class="tab-content">
        <div class="map-img-wrap" id="map-img-wrap"></div>
        <div class="map-legend">
          <div class="map-legend-title">LOCATIONS</div>
          <div id="loc-list"></div>
        </div>
      </div>
      <div id="tab-other" class="tab-content"></div>
    </div>
  </div>
  <button id="nc-side-toggle" title="Toggle panel" aria-label="Toggle panel" onclick="var a=document.getElementById('app');a.classList.toggle('nc-side-collapsed');this.textContent=a.classList.contains('nc-side-collapsed')?'‹':'›';">›</button>
  <div id="sidebar">
    <div id="nc-modebar">
      <button class="nc-mode active" data-mode="ref" onclick="ncSetMode('ref')">Reference</button>
      <button class="nc-mode" data-mode="player" onclick="ncSetMode('player')">Player Log</button>
      <button class="nc-mode" data-mode="gm" onclick="ncSetMode('gm')">GM Planner</button>
    </div>
    <div id="sidebar-head" onclick="showOverview()">◂ OVERVIEW MAP</div>
    <div id="district-list"></div>
    <div id="nc-side-panel"></div>
  </div>
</div>

        {
          "id": "6",
          "name": "Kitty Liquor",
          "desc": "When the Metalstrom opened in 2010, Mark MacGerald saw a fabulous opportunity for money making and purchased the fabric store next door. After a short period of greasing the right palms, he wound up with a liquor distribution license a n d opened his discount warehouse, which immediately became popular with those patrons of Metalstrom who didn't want to pay six euro for a Smash. Not wishing the wrath of a rich corp, he managed to convince the owner of Metalstrom to allow h i m to supply their li",

        {
          "id": "7",
          "name": "Warehouses",
          "desc": "Although the main offices of Mitifer, the art importers, are located in one of the corporate towers, they also own these two warehouses that are used to store the acquired pieces while awaiting passage through customs. The buildings are thoroughly sealed to protect against (interior) vandalism. Mitifer has been trying to unload the buildings, but due to the proximity of Metalstrom, Metal Heaven, and Kitty Liquor (all of whom attract lowlifes), no one is willing to meet their price. 77 NIGHT CITY",

        {

          "name": "DeskMate Corp",
          "desc": "This block is taken up by the DeskMate Corporation's main offices. A company whose main assembly line is but a part of this complex, DeskMate specializes in low-cost ultra-compact (and cheaply built laser printers. The corporation maintains its offices, laboratories, and assembly areas within a draconian security system, which includes several on-line netrunners, various warning devices and cameras, plenty of steel gates, and a hired private security force who don't appreciate their 6.25eb an ho",

        },
        {
          "id": "10",
          "name": "Windemere's",
          "desc": "Known city-wide as the Giant's Chair, the buildings that compose this block are actually a world-respected art gallery flanked north and east by private apartments and the studios in which art restoration is done for the gallery. Due to the expensive art objects that are often shown and stored here, security is extremely heavy, with live-in armed guards in fortified kiosks and vehicles making sure all \"undesirables,\" especially boosters o n their way to The Slammer, are kept away from the premis",

        },
        {
          "id": "11",
          "name": "NNews",
          "desc": "Reminiscent of a n old-time newsstand, the NNews building is really a souped-up dataterm. It has ten stations from which one may access any published material from the local screamsheets to international magazines. There is also a small autovendor at the east end, run by a marginally intelligent Al program. Don't even think about stealing a can of Smash; the autovendor has been known to chop the hands off would-be thieves. O r so they say.",

        },
        {
          "id": "12",
          "name": "Café Chrome",
          "desc": "So you've always thought you were one of the beautiful people, but were somehow shuffled out of the deck? Everyone knows that the Café is the place to be, so that's where you go to party in hopes that someone will recognize your true edgerunner nature and sweep you away from it all. During the day, many Corps come to enjoy the informal 50's decor and discuss their various business interests. The nights are dominated by the juvegang, young adult and rocker crowds who come to the Café to party, an",

        {

          "name": "All-RX Drugs",

        },
        {
          "id": "14",
          "name": "Systems Original",
          "desc": "This is a computer software firm which manufactures networking software similar to that used in the Net. Once on-line, a user needs only move their representative icon to the destination desired and they will be able to access the necessary data. The actual shipping and storage of the software packages is done from a warehouse in Pacifica. A t night, steel portcullises (SP 60) drop in front of the doors and windows.",

        },
        {
          "id": "15",
          "name": "CalBank Building",
          "desc": "This bank building is also home to several international l aw firms as well as CTC (a corporate insurance company) and Manfred's, an expensive German restaurant which specializes n dishes prepared with Japanese Kobe veal. The lobby is open-air (to illustrate CalBanks \"open door\" policy), but automatic APEX machineguns sweep the area a t night. Security is on the second floor, and may b e buzzed by intercom to acquire passage.",

        {

        },
        {
          "id": "17",
          "name": "Parkinson's Place",
          "desc": "When Larsen Parkinson began selling customized electronics integrated into furnishings, h e never imagined the response hewould receive. Within months, his operations had expanded from his garage to a vast industrial park, and then to a chain of stores that specialized in these custom furnishings. This branch of Parkinson's also carries an extensive selection of personal items for home and recreation.",

        {
          "id": "18",
          "name": "CiNEmaXUS",
          "desc": "This is an old-fashioned theater as well as a braindance arcade. It has fallen on hard times in recent years, with the presence of more and more punks on the streets at night, heading to Metalstrom, Metal Heaven, or the Slammer. The presence of this riffraff is driving the corporate clientele of this theater elsewhere, and daytime crowds alone are notenough to meet the bills. There are rumors that the theater will start catering to the streetpunks, thereby compounding the deterioration of this a",

        {

        {

          "desc": "This place bills itself as being a luxury hotel, and with good reason. With terminals in each room as well as a gym, spa, casino, shopping arcade and nightclub/lounge, the owners feel their customers, mainly businessmen, will spend their money inside the hotel and keep the profits up. If extralegal activities (drugs, illegal braindances or the like) are desired by visiting businessmen, the hotel concierge can arrange the desired \"service.\" Since this \"service\" is offered to in-house guests only,",

          "security": 1

        {

        {
          "id": "24",
          "name": "Night City Fire Station #1",
          "desc": "This fire station (one of two serving the Night City area is equipped with the most sophisticated fire and rescue equipment available. Utilizing both a ground and an air fleet, the fire division stationed here prides itself on being the best firefighting team in the Free State of Northern California. The smaller building to the east houses the garage for fire vehicles. Very loud sirens ensure that no one will remain on the sidewalk when a n alarm is called. Tw o indelible stains attest that ther",
          "security": 1
        },
        {
          "id": "25",
          "name": "Long Last Books",
          "desc": "This bookstore is owned by a couple who, in resistance to the publishing combines, only sell books by independent companies, as well as rare, out of print, banned, or hard-to- find books. Although they charge exorbitant rates, their stock is genuine, and though it may take them ten years or more to find something, they never stop looking. This store's defiance of social norms has brought them immunity from the gangs, but not from the corps.",
          "security": 0
        },
        {
          "id": "26",
          "name": "StreeTemps",
          "desc": "Although i t does not advertise itself as such (and in fact does not advertise itself at all), this is a well-known agency used to hire down-on-their-luckcyberpunksforrun-of-the-mill, though nonetheless questionable, activities. Those who use StreeTemps still prefer working the Street itself for larger operations. StreeTemps does not require any information on what the actual service will be, just what skills are required. Ignorance thus becomes a pat legal defense. They are allowed to remain in",
          "security": 1
        }
      ],
      "encounters": [
        "The NCPD is on the prowl. Most likely it's a squad car or a few on foot, but occasionally the NCPD sweeps the streets to clear them of undesirables.",
        "Any of several gangs heading to or from Metalstrom or Kitty Liquor. How they react depends on their mood. You can never tell with drunk punks.",
        "The Slammer's on overload, and the war has spilled into the streets. Scraps of two or more gangs having a running battle. Expect the NCPD soon.",
        "A group of young, bored, upper-class yahoos looking for entertainment to meet their jaded tastes.",
        "Corps heading to Café Chrome for some tense negotiations. Their bodyguards will not take kindly to your presence.",
        "A flying bottle heralds the arrival of some punks who want to heckle and intimidate you.",
        "Security Guards chasing someone.",
        "The Back Alley Brawlers take unwanted interest in your group.",
        "A small caravan and a large crowd herald someone famous (or infamous) arriving at The Advocet.",
        "An accident (possibly between a Barstow truck and a new AutoToys car) locks up an intersection."
      ],
      "contacts": [
        {
          "name": "Ziv Ellis",
          "desc": "A maid at the Advocet, she has passkeys to all the rooms. For enough money, she will sell you the key you need."
        },
        {
          "name": "Michael Stewart",
          "desc": "A trucker from Barstow, he hates street punks, and likes to use his heavily armored rig to squash them."
        },
        {
          "name": "Kamina Wazashi",
          "desc": "One of Allworld's best insurance investigators, she is always first on the scene of a claim. She is also an excellent source of any non-confidential information, particularly about local fires, accidents, etc."
        },
        {
          "name": "Wilgan Adven",
          "desc": "A security guard at Aquadynamics, he likes his job, and will not betray the company. However, if the company is under any threat he will act to defend it."
        },
        {
          "name": "Martin Scall",
          "desc": "Barkeep at Metalstrom, he keeps a close eye on problems involving patrons. He will, on occasion, help arrange meetings between people he likes."
        }
      ],
      "personalities": [
        {
          "name": "Suds Joliet",
          "desc": "Suds Joliet owns and operates the Slammer. A former singer in the 90's metalpunk band Stormrider, he decided to open his own bar to showcase new acts. Upon realizing the bar/arena could also be used to settle disputes between gangs, he opened it up to that idea and has profited by running betting booths as well. He does not enter the fights himself, but has been known to sing for bands that need a substitute."
        },
        {
          "name": "P.L. Ellison",
          "desc": "Originally a beat writer for Rockerboy Magazine, P.L. now has his own half hour show, Style and Substance, which he broadcasts live from the Cafe Chrome every Wednesday night. Although he usually has a set script for the show, it is not uncommon for him to deviate from the night's agenda if the opportunity to interview or harass a celebrity arises."
        }
      ]
    },
    "A5": {
      "name": "Upper Marina",
      "section": "A5",
      "intro": "Old industrial and pier area. Home to the Ferry Building, Yacht Club, and a new 16 point combat parcourse.",
      "security": "Low-Medium",
      "locations": [
        {
          "id": "1",
          "name": "C. Donut Express Co",
          "desc": "This is a trucking company equipped with long-haul semis, local delivery vans, and armored cars. The Night City facility combines a truckyard with a trans-shipment warehouse to transfer shipments between local and long-haul trucks. This is a good place for nomads to pick up jobs as convoy outriders; they hire at all hours and don't ask too many questions. AS#2 Big Blue Foods: This is a factory for food processing. Food from the fields is combined with processed soy powder, yeast products, spices",
          "security": 1
        },
        {
          "id": "3",
          "name": "Osborne-Spielberg Publishing",
          "desc": "This building combines office and warehouse space. Books, tapes, and other media are stored for regional distribution, and the offices house the corporate headquarters and editorial 82 offices. Actual media production (printing, etc.) is done elsewhere.",
          "security": 1
        },
        {
          "id": "4",
          "name": "Chrome Cross",
          "desc": "This firm supplies the high-tech gear used by the medics at local knife parlors to install cyberwear and heal wounds. CC is a big firm with a long catalogue containing everything a medtech could conceivably need. They have a tast delivery system to send supplies to the sites of medical emergencies throughout the area.",
          "security": 1
        },
        {
          "id": "5",
          "name": "Night City Today!",
          "desc": "This is the home of Night City's most popular mainstream screamsheet. Locally produced editorial content is added to a nationally distributed news product for piping to screamboxes all across town. Night City Today! is the kind of rag that depends on lurid headlines for circulation, rather than on hard-hitting journalism.",
          "security": 1
        },
        {
          "id": "6",
          "name": "Servospiff",
          "desc": "This is a reputable supplier of security-coded work fashions to large and small corps throughout the Free States of California and nationwide. Servospiff's highly regarded security precautions keep the registered designs out of the hands of unauthorized would-be purchasers.",
          "security": 1
        },
        {
          "id": "7",
          "name": "Mustang Arms Co",
          "desc": "Largely a NorCal regional headquarters and warehousing point, the actual combat hardware is produced in gigantic automated factories elsewhere. Mustang specializes in shoulderarms, with supplemental lines of pistols and cyberlimb weapons.",
          "security": 2
        },
        {
          "id": "8",
          "name": "Acme Distributors",
          "desc": "Acme Distributors does a legitimate business in goodstransfer, but there are a lot of odd goods which come in through the back door, \"hot\" off the street.",
          "security": 1
        },
        {
          "id": "9",
          "name": "Cleanroom",
          "desc": "These people clean corporate offices, doing thingslike waxing floors and desktops, taking out the trash, etc. A l l service personnel are bonded, as they have access to the innermost areas of powerful companies.",
          "security": 1
        },
        {
          "id": "10",
          "name": "24 Hour Cafe",
          "desc": "This is one of a durable breed of \"joints\" serving food to the neverending stream of workers and wanderers w h o pass through the maritime area. Very popular among the smugglers and other dockside denizens of the area, thanks to its \"home- cooked style\" meals.",
          "security": 0
        },
        {
          "id": "11",
          "name": "SensuTours",
          "desc": "Ostensibly a travel agency, SensuTours is really a front for Interpol, the EEC's police/secret service. SensuTours rarely sells travel packages, and is amazingly inefficient when dealing with real customers.",
          "security": 2
        },
        {
          "id": "12",
          "name": "Harbormaster's Office",
          "desc": "The Harbormaster is in charge of the Port of Night City, including the maritime district extending to San Morro Bay to the south. The Harbormaster handles shipping movements, assignment of facilities, etc. while his agents, the Harbor Police, have jurisdiction over this area. This often puts them up against the NCPD, whom they consider hopelessly corrupt.",
          "security": 2
        },
        {
          "id": "13",
          "name": "American Bar",
          "desc": "A watering place catering to mercenary soldier-type solos as well as toughs and laborers from the waterfront. The bar is licenced by the Harbormaster's Office, but it is often under the surveillance of the NCPD and the CIA.",
          "security": 1
        },
        {
          "id": "14",
          "name": "Department of Motor Vehicles",
          "desc": "This building is the Night City DMV. All traffic fines are paid here. The DMV also handles all registration and traffic clearances for both ground and air vehicles.",
          "security": 2
        },
        {
          "id": "15",
          "name": "Medicross Preservation",
          "desc": "A slightly legal \"body bank\" that collects a good portion of Night City's unnamed and unidentified corpses. Then the bodies are dissected and used for donor parts for such illustrious hospitals as the Medical Center. Medicross also pays for intact body parts: 500eb for an arm, 600eb for a leg, 700eb for vital organs, 200eb for secondary organs, and 800eb for eyes. Prices are reduced drastically for diseased or damaged parts. Some dorphers have been known to hawk parts of their bodies to afford a",
          "security": 1
        }
      ],
      "encounters": [
        "A parade/convoy of U.S. Army troops rolls up from south of the city and rumbles over the Bridge to an embarkation point at North Oak.",
        "A fixer approaches the party offering a best buy in recently stolen merchandise. Determine what's wrong with the deal, and then let the characters use their street skills to see if they can find out what it is. Maybe they can figure out how to make some money.",
        "Word on the Street is that a small fishing boat is going to tie up at the finger piers carrying illegal drugs under a layer of somewhat stale fish.",
        "The Chrome Angels are here, setting up an ambush against an enemy gang. This is a Guardian-type outfit; they won't bother the PCs if they're cool. The GM can make it really hard for the players to keep their characters cool.",
        "Of course traffic is stopped. Traffic will stop for no reason at all, and this time two huge trailer rigs are parked in the street while the drivers argue about who has the right to load cargo from a particular shipper.",
        "Did you notice that the bridge drops traffic directly into the traffic grid of Night City? It's rush hour and there is no way to move faster than a slow walk in traffic on any street remotely connected with the bridge. Rush hour occurs three times a day and lasts four hours.",
        "An agent on the corner is recruiting parties of Cyberpunks to move small, valuable commodities from Night City to various parts of the world. If the characters want a job, she is hard to get. If they don't want to be bothered, she is persistent.",
        "Nuthin' happening."
      ],
      "contacts": [
        {
          "name": "Horsehead Harry",
          "desc": "A shop steward for the union at C. Donut's. Hates the corps and will help anyone willing to blacken a corporate eye."
        },
        {
          "name": "Rikki Sampson",
          "desc": "She runs the swing shift at the American Bar. A good person to know if you want the scoop on any corrupt Night City institutions."
        },
        {
          "name": "Lt. Robert James",
          "desc": "One of the Harbor Police. He will give you help only if he deems it necessary for the greater good. He cannot be bought."
        },
        {
          "name": "Alex Andersen",
          "desc": "Works for Chrome Cross. He can get parts cheap for a friend."
        },
        {
          "name": "Synthia Harrison",
          "desc": "The top regional salesperson for Mustang Arms. She might give you a deal if you buy in bulk."
        }
      ],
      "personalities": [
        {
          "name": "Harbormaster Mahan Jones",
          "desc": "Captain Mahan Jones is a cop who also happens to be a government official. Jones has made the Harbor Authority and its associated Harbor Police into a separate government in his part of town. He considers the civic bureaucracy of Night City irredeemably corrupted by corps and the Mob. Jones tolerates no corruption within his own organization. The Harbor Police are in charge of law and order in the dockside area, and there are infrequent conflicts when the NCPD have been bought off for a caper."
        }
      ]
    },
    "A6": {
      "name": "East Marina",
      "section": "A6",
      "intro": "East Marina waterfront district.",
      "security": "Low",
      "locations": [
        {
          "id": "1",
          "name": "Joe's Diner",
          "desc": "This is a traditional, human-staffed'fast food' joint, part of the quarter's quaint atmosphere. In addition to the tourists, local working people frequent this eatery seeking their workday provender. Gang elements are excluded by the regular patrons, who wish to eat undisturbed, and are quite willing to rip your head off to make sure things stay that way.",
          "security": 0
        },
        {
          "id": "2",
          "name": "Pier Three Paradise",
          "desc": "This is a typical renovation of the cavernous warehouse associated with this obsolete finger pier. This conversion features a big renta- space flop parlor, an \"exotic\" schlock chain restaurant catering to low/middle level corporates, and an all-night bar. 86",
          "security": 1
        },
        {
          "id": "3",
          "name": "Wierd Stuff",
          "desc": "Weird Stuff is the ultimate expression of techie heaven. The owners appear to have bought every odd lot of leftover spare partson the Pacific seaboard. Techs can often find replacement parts or equipment at a suitable reduction in Difficulty (at the ruling of the Referee) due to the vast collection of unorganized miscellany assembled here. Pirates and smugglers often unload their electronic booty here.",
          "security": 1
        },
        {
          "id": "4",
          "name": "Universal Export",
          "desc": "This is a consulting firm specializing in sea freight tariffs and standard shipping routes. U E is also rumored to be a front for the British Provisional Government's notorious Army Intelligence Active Service (ARMINTAC), particularly its branches dealing in covert anti-IRA operations in the United States.",
          "security": 1
        },
        {
          "id": "5",
          "name": "United Express",
          "desc": "This small-package courier service guarantees delivery of \"anything smaller than a breadbox\" anywhere in human space within 24-30 hours. Their familiar rocket-red AV's ply business and industrial routes all over the world and even into orbit.",
          "security": 1
        },
        {
          "id": "6",
          "name": "ILLW Hiring Hall",
          "desc": "While labor unions are in something of a decline in the Cyberpunk era, the ILLW still controls the longshoremen and technical crews who load and unload the ships stopping at Night City. The ILLW is the last bastion of the organized labor movement in this area.",
          "security": 0
        },
        {
          "id": "7",
          "name": "Stallion Slough Shipyard",
          "desc": "This is the local office of Night City's only major shipyard The main facility, located a few miles to the south, can build hulls up to 5,000 tons standard displacement. Stallion Slough's Night City facility is a rat's nest of small docks, cubbyholes a n d berths where the local pirate fleet occasonally hides its larger vessels.",
          "security": 2
        },
        {
          "id": "8",
          "name": "Baltic Real Estate Co",
          "desc": "Baltic is a specialist realtor, dealing exclusively with commercial real estate in the Maritime area. Baltic deals in factory and warehouse space, although some office suites are also handled.",
          "security": 1
        },
        {
          "id": "9",
          "name": "Lucky Barber Shop",
          "desc": "A unisex clip joint, frequented by Korean and Chinese gangsters. In the wake of the Second Corporate War, a number of Taiwanese, Indonesian and Phillipine pirate tong members have relocated to the NorCal region and are joining the local pirate groups. A good place for Nomads to pick up work, or ex-Navy to make contacts.",
          "security": 0
        },
        {
          "id": "10",
          "name": "Eastern Star Novelty Co.",
          "desc": "Yet another front organization, this almost legitimate ( i t makes money) importer of exotic toys from all around the world is also the West Coast station for the Chinese secret service. Separate from the consular contacts with the business world, Eastern Star is a hub of espionage and other deviltry in the coastal region.",
          "security": 2
        },
        {
          "id": "11",
          "name": "Prudhoe Pride Oil Co.",
          "desc": "Oil is almost as big a business as ever; the reserves are good for at least thirty more years, and there's a lot of money to be made now that the Arabs are out of business (especially in plastics). PPO has refineries and storage tanks in the San Morro Bay area.",
          "security": 1
        },
        {
          "id": "12",
          "name": "Reunification Hall a n d Social Club",
          "desc": "This is a facility where small and large groups rent rooms to hold meetings. The Night City Recreation Department rents this hall a lot for various youth functions. Concerts are held occasionally.",
          "security": 0
        },
        {
          "id": "13",
          "name": "Arcade Arcade",
          "desc": "This is also a youth facility, although on an individual use basis. It is a typical arcade, occupying the second floor of its building, with visual-mechanical interfaces, as well as games played only by braindance. The well-patronized fast food bar is a popular feature of Arcade Arcade.",
          "security": 0
        },
        {
          "id": "14",
          "name": "Good Night Rooms and Coffins",
          "desc": "This is a flophouse on the first floor of the Arcade building; a suitable address for the streetscum who doesn't have a van to live in. Good Night features stand-up rooms with and without bath, as well as coffin-sized sleeping bag spaces.",
          "security": 0
        },
        {
          "id": "15",
          "name": "Blue Light Special Sales",
          "desc": "Local rockers know that equipment from Blue Light is right up there with the best. Axes, consoles, amps, process computers, and a full line of musician's cyberware are featured at the full- service warehouse and sales center occupying the entire first floor of this building.",
          "security": 1
        },
        {
          "id": "16",
          "name": "Decker, Tanaka & Rogers",
          "desc": "One of the giants in the shipping business, D, T& R is famous 88 for its modern shipping fleet. This building is the office for the Night City area. The loading facilities are in South Night City. D, T&R are always looking for escorts on freighters heading for the Pacific Rim. They will provide food and lodging in return for protection from pirates. An excellent way to leave the country.",
          "security": 1
        }
      ],
      "encounters": [
        "There is a labor dispute brewing. Solos from one of the remaining unions are getting ready to defend a picket line from some corporate solos, who are lining up and getting ready for something.",
        "A gang is in the act of hijacking a large truck loaded with some kind of goods. Is either the trucking company, or the gang, one which the PCs are watching?",
        "A group of corporates, suits and all, are walking/cruising furtively down the street, looking for an address. Which seedy gang or Secret Service are they trying to find?",
        "There's a big concert at Reunification Hall. Traffic is a mess, and a lot of the cops are there, rather than on the street.",
        "Gang rumble in progress. Make the gangs important to the adventure at hand, or make a selection of your favorite Night City skuzzies; sometimes gangs will come down to this area just to have it out.",
        "Obvious foreigners (wrong clothes, strange foreign language, etc.) walking/cruising furtively down the street looking for an address. Are they trying to find the corporates from encounter #3?",
        "Another spontaneous rock concert. Over here nobody cares, and traffic is dead for some minutes. If the PCs investigate, they might find a needed bit of information.",
        "A Harbor Police wagon pulls up and disgorges a squad or two of cops who raid a building.",
        "Out of nowhere, a gun battle starts between two groups, neither of which seems to be a gang or any kind of police.",
        "There is a show of force in the area by the Night City police, who are patrolling the waterfront in numbers, inside APCs."
      ],
      "contacts": [
        {
          "name": "\"John Smith\"",
          "desc": "The manager of Eastern Star Novelty. He hears all and is a great source of information — once he trusts the players."
        },
        {
          "name": "\"Elizibeth\"",
          "desc": "One of the more lucid and sociable of the Wild Things (the local gang), she is willing to sell out the gang if the price is right."
        },
        {
          "name": "Nina Santiago",
          "desc": "A waitress at Joe's, she has her ear to the ground and knows much about the surrounding streets. She is also an incurable romantic, and is a sucker for love."
        },
        {
          "name": "Billy \"The Packrat\" Osgood",
          "desc": "The catalog chief at Weird Stuff. If you're on his good side, there's nothing he can't dig up for you."
        },
        {
          "name": "Gina Josephson",
          "desc": "An active player in the video-juvie gangs, Gina spends her days in Arcade Arcade. She has an uncanny knowledge of the movements of almost all gangs in the city. No one knows where she lives, and her price is high, but with her on your side your chances of out-maneuvering any gang have just increased drastically."
        }
      ],
      "personalities": [
        {
          "name": "Mountain Joe",
          "desc": "A dedicated foe of the corporate system. The expression of his outrage is through the old-fashioned labor union movement. He is a competent organizer, capable of making many dedicated low-level corps aware of their downtrodden condition."
        },
        {
          "name": "Captain Comet",
          "desc": "United Express dispatcher. Comet, the night man at U.E., is usually good for a job for special friends of his who are in need, but the PCs have to make him their friend. He's also a good source of news in the shipping business."
        }
      ]
    },
    "B1": {
      "name": "West Hill",
      "section": "B1",
      "intro": "Elegant, self-contained community catering to the wealthy and powerful.",
      "security": "High",
      "locations": [
        {
          "id": "1",
          "name": "West Hill Gardens",
          "desc": "West Hill Gardens consists of executive class apartments o n the gentle slope of West Hill. Underground parking leaves the grounds free for gardens and covered benches. West Hill has incorporated many state of the art services to protect the residents and make their lives easier. Residents enter their building using personal electronic security cards. Contract 90 housekeeping services are available, a s are fully automated laundry facilities. Each of the apartment buildings connects with Pinewoo",
          "security": 2
        },
        {
          "id": "2",
          "name": "Pinewood Spa",
          "desc": "The spa features all the exercise facilities favored by today's executives. The management has just installed new Braindance Bodytoner booths, in which the patrons immerse themselves in the latest Braindances while their bodies are electronically exercised. For the more traditional there is an old-fashioned weight machine room, handball courts, and a multi-purpose sport gymnasium. On the roof is a n oval jogging track and swimming pool.",
          "security": 1
        },
        {
          "id": "3",
          "name": "West Hill Church of God",
          "desc": "This quaint Episcopalian Church was here even before West Hill Gardens was built. It continues to serve the spiritual needs of the residents in this modern millennium.",
          "security": 0
        },
        {
          "id": "4",
          "name": "Pinewood Bazaar",
          "desc": "Light from the glass domes spills down to illuminate the shops and boutiques in this subterranean shopping center. Pinewood Bazaar features many upscale boutiques that cater to the tastes of urban professionals. Among them are BodyWorks bodysculpters; a pair of art galleries: one featuring modern Korean and Vietnamese works, and the other reproductions of the classics; bookstores; clothing shops; jewelry shops; and Merrillians, a fully automated supermarket where customers can shop from a comput",
          "security": 2
        },
        {
          "id": "5",
          "name": "Tiajuana Cafe",
          "desc": "Light dishes from Mexico, served under a peasant-style thatched roof. Chef Casteda is not only a master of Mexican cuisine; his study of custom and history brings an authentic native atmosphere to the Tiajuana Cafe. Try the hand. made tortillas with anything, and don't forget to order the sopias for dessert.",
          "security": 1
        },
        {
          "id": "6",
          "name": "Nino Tea House",
          "desc": "Japanese fare with an Okinawan accent. Nino's features full- course meals of everything from rustic pig's ear sashimi to more traditional fare. Or try the sushi bar for a light meal and saki.",
          "security": 0
        },
        {
          "id": "7",
          "name": "Serengeti Gallery",
          "desc": "Just inside the door a pride of wild lions lazily sun themselves in the branches of a tree. In other corners giraffes and rhinoceroses graze, as monkeys chatter above their heads. While the plants are real, the animals are only holographs. Serengeti Gallery specializes in African wildlife holography. Perhaps the most startling is the leopard holograph that looks for all the world like a wild cat draped across the coffee table- a definite conversation starter in any living room. The holographs al",
          "security": 1
        },
        {
          "id": "8",
          "name": "Park Shops",
          "desc": "Numerous service businesses, mainly coffee shops and a copy store, fill this block. The Krishna Coffee-shop at the northwest corner is renowned for the artists and poets that frequent it. Here one can find the best literary and artistic talents of Night City arguing the finer points of style among themselves. A dataterm and a screamsheet box stand at the northeast. corner.",
          "security": 1
        },
        {
          "id": "9",
          "name": "Apartments",
          "desc": "A mixture of students, artists, and professionals rent in these buildings.",
          "security": 1
        },
        {
          "id": "10",
          "name": "Warehouses and Art Studios",
          "desc": "Some of these warehouses have been converted to artist's studios, while still others house small businesses. Some of the larger corporations store their goods here. The area also includes an outlet of Silverhand Studios, as well as numerous small art galleries dotting the ground floors of buildings.",
          "security": 1
        },
        {
          "id": "11",
          "name": "Shops",
          "desc": "The Rainbow Art Supply store, a taco stand, and a convenience store grace this side of the block, evidence of t h e bare minimum artists require to create their works.",
          "security": 0
        },
        {
          "id": "12",
          "name": "West Hill Library",
          "desc": "This is the West Hill branch of the main library. 92",
          "security": 0
        },
        {
          "id": "13",
          "name": "Petrochem Fine Arts Museum",
          "desc": "Generous corporate sponsorship has allowed Night City to build this recently completed fine arts museum to complement the downtown City Museum. Built in the style of an Italian Renaissance square, the entire museum is open to a central courtyard which can be entered only through the gatehouse. The fourmain buildings are organized into Ancient Art, Classical, Contemporary, and Sculpture. The smaller building north of the entrance gatehouse contains the administrative offices and functionary rooms",
          "security": 2
        },
        {
          "id": "14",
          "name": "NCU Fine Arts Campus",
          "desc": "Built alongside the museum, the Night City University Fine Arts campus works with the Petrochem Fine Art Museum in educating the students and maintaining the museum's impressive collection. Here students can work in the many studios and workshops, and study art history with actual samples next door in the museum. A contingent of NCU Campus Police maintains order on the Fine Arts campus. The University also operates shuttle buses between here and the main campus in the interest of student safety.",
          "security": 2
        },
        {
          "id": "15",
          "name": "Assorted Businesses",
          "desc": "These high-rise office buildings house numerous small and medium sized businesses. Among them are the G H P Architectural Firm, Stohlman & Stohlman Accounting, Pegasus Graphics, World Wide Engineering, Night City Newspaper Agency, Gueller & Stravinsky Law Offices, Pacific Security Services, Union Publishers, Coastal Real Estate, and many others. Interspersed among the ground floors are many cafes, convenience stores, restaurants, book stores, a kung fu studio, and other retail shops.",
          "security": 1
        },
        {
          "id": "16",
          "name": "Night-Marriot Hotel",
          "desc": "The glossy black tower of the Night-Marriot Hotel stands over its companion convention center at the top of West Hill, where it is visible to the southern edge of Lake Park. Discreetly tucked away in the lobby are a dataterm and a screamsheet box. Numerous small shops decorate the hotel's ground level concourse. On the uppermost floor, the Kilimanjaro Peak restaurant commands a majestic view of the city fromatop the tower. Dine on the finest African cuisine available anywhere in the city, with r",
          "security": 2
        },
        {

          "desc": "As befits a corporation whose sole reason for existence is the handling and application of large sums of money, the MA&F tower is a masterpiece of subdued majesty. At only 55 floors (and a relatively small cross section), it is one of the smaller buildings in the Corporate Plaza, but it is also one of the most eye-catching and elegant. The building is surfaced with glass overlying a steel frame. The interior floors of the building are built as open, plant-festooned terraces within the glass wall",
          "security": 3
        },
        {
          "id": "1",
          "name": "1st CitiBank Tower",
          "desc": "This tower, the largest bank building in Night City, is the national and local head office for 1st CitiBank. 1st CitiBank is one of the largest American banks, and one of the few holding its own against European and Japanese competitors. The tower is a fairly standard looking affair, with a black granite and glass exterior, and the usual rooftop aircraft and subterranean vehicular facilities. Inside, the bank is richly and stylishly appointed. Publicaccess is limited to the parking lot and the t",
          "security": 3
        },
        {

          "name": "The Fujiwara Bank Building",

        {
          "id": "3",
          "name": "The Night City Stock Exchange and Trade Center",
          "desc": "Building: This building contains trading areas for all of the world's major securities, stock and commodities markets, as well as brokerage offices for several firms. Included for each market are computer marketing and telecommunications areas, which handle part of the business automatically, and trading pits where deals are made in the good, old-fashioned push-and-shove manner. Depending on the market or particular commodity, deals are either processed strictly through computer, or by humans in",
          "security": 3
        },
        {
          "id": "4",
          "name": "The Militech Corporation",
          "desc": "This building is the Night City office of the prosperous, worldwide Militech corporation. The Night City building is relatively small, as i t handles purely bureaucratic business. Security is provided by Militech corporate soldiers, and is very tight. See the Megacorps 2020 section in Cyberpunk 2020 for more information on Militech.",
          "security": 3
        },
        {
          "id": "5",
          "name": "The West Plaza Executive Tower",
          "desc": "A typical executive office space building, home to several small companies and businesses. Law offices are prevalent, with the largest being the headquarters of the prestigeous Howard, Fine and Howard, Attorneys at Law. Howard, Fine and Howard maintains a large staff of excellent legal and paralegal personnel, with experts in corporate law, international law, space law, entertainment law, warfare and military justice, and federal and local law. They are the best, but they are expensive. Their cl",
          "security": 2
        },
        {
          "id": "6",
          "name": "The Federal Building",

          "security": 1
        },
        {
          "id": "7",
          "name": "The Japanese Consulate",
          "desc": "This is the largest consular building in Night City. It houses not only the consulate proper, but also the main American office of the Japanese trade ministry, which oversees all matters of import and export to and from the United States. All personnel, including a security detachment of 100 diplomatic police, live in apartments in the consulate. The living quarters of the higher ranking officials are quite lavish, and security is tight",

        },
        {
          "id": "8",

          "security": 3
        },
        {
          "id": "9",

          "security": 3
        },
        {
          "id": "10",

          "desc": "The only part of this block not owned by the Ashcroft- Hammersmith combine, this building has a private doctor's office and surgery ward, private dental and cybernetic services, and private body customization shop. I t is tolerated in its proximity to the hotel because the services are expensive and top of the line, and the clientele is largely rich and powerful. No credit accepted. 112",

        },
        {
          "id": "11",

          "desc": "This is the closest thing Night City has to a medical school and research hospital. While not in the business of accepting charity cases, this hospital does treat patients who subscribe to most of the available health insurance plans, and it accepts emergency a n d Trauma Team cases. It offers these services because it is Night City's largest hospital, and because it is also annexed to Night City's most prestigious medical research school. Security throughout most of the hospital is reasonably l",

        {

          "desc": "Towering over most of the city's buildings, the dark blue mirrored glass of this Corporate-funded monolith perfectly complements the cold, clean look PR officials desire for the local judicial system. Inside its grand tower and subterranean passages is one of the most efficient examples of the modern justice system at work. Housed here you will find the Night City Police Precinct #1, the city arraignment courts, jail cells, braindance rehabilitation areas, a police academy, and simulators for th",

        {

        {

        },

        {

        {

// Canvas hitmap system
var COLOR_MAP = {
  '254,0,0':'A1', '0,35,233':'A2', '0,255,61':'A3', '0,255,63':'A3',
  '79,64,133':'A4', '255,81,83':'A5', '255,212,1':'A6',
  '182,130,132':'B1', '20,58,61':'B2', '22,57,61':'B2', '18,60,59':'B2',
  '200,0,255':'B3', '207,200,154':'B3',
  '52,37,32':'B4', '63,153,128':'B5', '170,173,216':'B6',
  '140,37,38':'C1', '162,255,0':'C2', '160,255,0':'C2', '163,255,0':'C2',
  '1,178,255':'C3', '166,249,255':'C4', '206,255,164':'C5', '1,14,126':'C6'
};

var hitCanvas = document.getElementById('map-hitcanvas');
var hitCtx = hitCanvas.getContext('2d', {willReadFrequently: true});
var hitReady = false;
var hitImg = new Image();
hitImg.crossOrigin = 'anonymous';
hitImg.onload = function() {
  hitCanvas.width = hitImg.naturalWidth;
  hitCanvas.height = hitImg.naturalHeight;
  hitCtx.drawImage(hitImg, 0, 0);
  hitReady = true;
};
hitImg.src = 'img/maps/hitmap.png';

function getDistrictAtPixel(e) {
  if (!hitReady) return null;
  var rect = document.getElementById('map-img').getBoundingClientRect();
  var x = (e.clientX - rect.left) / rect.width;
  var y = (e.clientY - rect.top) / rect.height;
  var px = Math.floor(x * hitCanvas.width);
  var py = Math.floor(y * hitCanvas.height);
  if (px < 0 || py < 0 || px >= hitCanvas.width || py >= hitCanvas.height) return null;
  var pixel = hitCtx.getImageData(px, py, 1, 1).data;
  var key = pixel[0] + ',' + pixel[1] + ',' + pixel[2];
  // Try exact match first
  if (COLOR_MAP[key]) return COLOR_MAP[key];
  // Try fuzzy match (within tolerance of 15)
  for (var k in COLOR_MAP) {
    var parts = k.split(',').map(Number);
    if (Math.abs(parts[0]-pixel[0]) < 15 && Math.abs(parts[1]-pixel[1]) < 15 && Math.abs(parts[2]-pixel[2]) < 15) {
      return COLOR_MAP[k];
    }
  }
  return null;
}

var mapContainer = document.getElementById('map-container');
var hoverLabel = document.getElementById('map-hover-label');

mapContainer.addEventListener('mousemove', function(e) {
  var code = getDistrictAtPixel(e);
  if (code && DATA.grid[code]) {
    hoverLabel.textContent = code + ' — ' + DATA.grid[code].name;
    hoverLabel.style.display = 'block';
    hoverLabel.style.left = (e.clientX - mapContainer.getBoundingClientRect().left + 12) + 'px';
    hoverLabel.style.top = (e.clientY - mapContainer.getBoundingClientRect().top - 30) + 'px';
    mapContainer.style.cursor = 'pointer';
  } else {
    hoverLabel.style.display = 'none';
    mapContainer.style.cursor = 'default';
  }
});

mapContainer.addEventListener('mouseleave', function() {
  hoverLabel.style.display = 'none';
});

mapContainer.addEventListener('click', function(e) {
  var code = getDistrictAtPixel(e);
  if (code) selectDistrict(code);
});

function showOverview() {
  currentDistrict = null;
  document.getElementById('overview').style.display = 'block';
  document.getElementById('district-view').style.display = 'none';
  document.querySelectorAll('.dist-item').forEach(function(el) { el.classList.remove('active'); });
}

function selectDistrict(code) {
  var d = DATA.districts[code];
  var g = DATA.grid[code];
  currentDistrict = code;

  document.querySelectorAll('.dist-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.code === code);
  });

  document.getElementById('overview').style.display = 'none';
  document.getElementById('district-view').style.display = 'block';

  document.getElementById('dv-code').textContent = code;
  document.getElementById('dv-name').textContent = g.name;

  // Banner image — show if exists, hide on error
  var banner = document.getElementById('dv-banner');
  banner.style.display = 'block';
  banner.src = 'img/districts/' + code + '-banner.jpg';

  if (d) {
    document.getElementById('dv-intro').textContent = d.intro;
    document.getElementById('dv-sec').textContent = 'Security: ' + d.security;
    renderOverview(d);
    renderMapTab(code, d);
    switchTab('overview');
  } else {
    document.getElementById('dv-intro').textContent = g.desc;
    document.getElementById('dv-sec').textContent = 'No detailed data yet — send more sourcebook pages!';
    document.getElementById('enc-list').innerHTML = '<div class="ov-empty">No data.</div>';
    document.getElementById('con-list').innerHTML = '<div class="ov-empty">No data.</div>';
    document.getElementById('per-list').innerHTML = '<div class="ov-empty">No data.</div>';
    document.getElementById('loc-list').innerHTML = '<div class="ov-empty">No locations on record.</div>';
    document.getElementById('map-img-wrap').innerHTML = '<div class="map-img-missing">No map available.</div>';
    switchTab('overview');
  }
}

function switchTab(tab) {
  document.querySelectorAll('.dv-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  document.querySelectorAll('.tab-content').forEach(function(c) {
    c.classList.remove('active');
    c.style.display = 'none';
  });
  var el = document.getElementById('tab-' + tab);
  el.classList.add('active');
  el.style.display = tab === 'map' ? 'flex' : 'block';
}

function renderOverview(d) {
  // Description block
  var descEl = document.getElementById('ov-desc');
  descEl.innerHTML = d.intro
    ? '<div style="font-size:11px;line-height:1.7;color:var(--text2)">' + d.intro + '</div>'
    : '';

  // Encounters
  var encEl = document.getElementById('enc-list');
  if (d.encounters && d.encounters.length) {
    encEl.innerHTML = d.encounters.map(function(e, i) {
      return '<div class="enc-item"><span class="enc-num">' + (i + 1) + '.</span><span>' + e + '</span></div>';
    }).join('');
    document.getElementById('ov-encounters').style.display = 'block';
  } else {
    encEl.innerHTML = '<div class="ov-empty">None on record.</div>';
    document.getElementById('ov-encounters').style.display = 'block';
  }

  // Contacts
  var conEl = document.getElementById('con-list');
  if (d.contacts && d.contacts.length) {
    conEl.innerHTML = d.contacts.map(function(c) {
      return '<div class="person-card"><div class="person-name">' + c.name + '</div><div class="person-desc">' + c.desc + '</div></div>';
    }).join('');
    document.getElementById('ov-contacts').style.display = 'block';
  } else {
    conEl.innerHTML = '<div class="ov-empty">None on record.</div>';
    document.getElementById('ov-contacts').style.display = 'block';
  }

  // Personalities
  var perEl = document.getElementById('per-list');
  if (d.personalities && d.personalities.length) {
    perEl.innerHTML = d.personalities.map(function(p) {
      return '<div class="person-card"><div class="person-name">' + p.name + '</div><div class="person-desc">' + p.desc + '</div></div>';
    }).join('');
    document.getElementById('ov-personalities').style.display = 'block';
  } else {
    perEl.innerHTML = '<div class="ov-empty">None on record.</div>';
    document.getElementById('ov-personalities').style.display = 'block';
  }
}

function renderMapTab(code, d) {
  // Map image — onerror shows fallback
  var wrap = document.getElementById('map-img-wrap');
  wrap.innerHTML = '';
  var mapImg = document.createElement('img');
  mapImg.src = 'img/districts/' + code + '-map.jpg';
  mapImg.alt = 'Map of ' + code;
  mapImg.style.cssText = 'width:100%;height:100%;object-fit:contain;display:block';
  mapImg.onerror = function() {
    var fb = document.createElement('div');
    fb.className = 'map-img-missing';
    fb.textContent = 'No map available.';
    wrap.replaceChild(fb, mapImg);
  };
  wrap.appendChild(mapImg);

  // Legend = locations list (click to expand description)
  var locEl = document.getElementById('loc-list');
  if (d.locations && d.locations.length) {
    locEl.innerHTML = d.locations.map(function(l) {
      return '<div class="legend-item" onclick="this.classList.toggle(\'open\')">' +
        '<div class="legend-head">' +
        '<div class="legend-num">' + l.id + '</div>' +
        '<div class="legend-name">' + l.name + '</div>' +
        '</div>' +
        '<div class="legend-desc">' + l.desc + '</div>' +
        '</div>';
    }).join('');
  } else {
    locEl.innerHTML = '<div class="ov-empty">No locations on record.</div>';
  }
}
