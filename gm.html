<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rache Bartmoss' Datafort — GM Dashboard</title>
<link rel="icon" href="img/favicon.ico">
<link rel="stylesheet" href="css/main.css">
<style>
  html, body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--mono); display:flex; flex-direction:column; overflow:hidden; }
  #gm-nav { background:#111; color:#fff; display:flex; align-items:center; gap:14px; padding:0 16px; height:44px; flex-shrink:0; }
  #gm-nav h1 { font-family:var(--head); font-size:18px; letter-spacing:4px; margin:0; }
  #gm-nav .sub { color:#888; font-size:11px; letter-spacing:2px; }
  .gm-status { margin-left:auto; font-size:11px; letter-spacing:1px; color:#b8860b; border:1px solid #555; padding:3px 10px; }
  .gm-status.on { color:#1a7a2e; border-color:#1a7a2e; }
  #gm-bar { display:flex; align-items:center; gap:12px; padding:8px 16px; border-bottom:2px solid #111; flex-shrink:0; }
  #gm-bar .gm-campaign-lbl { font-family:var(--head); font-size:13px; letter-spacing:2px; }
  #gm-campaign { font-weight:bold; }
  /* tab strip */
  #gm-tabs { display:flex; align-items:stretch; background:#111; flex-shrink:0; overflow-x:auto; }
  .gm-tab { padding:8px 16px; background:#fff; color:#555; border-right:1px solid #ccc; font-family:var(--mono); font-size:13px; cursor:pointer; white-space:nowrap; }
  .gm-tab:hover { color:#111; }
  .gm-tab.active { background:#111; color:#fff; font-weight:bold; }
  /* content */
  #gm-content { flex:1; position:relative; overflow:hidden; }
  #gm-roster { position:absolute; inset:0; overflow:auto; padding:16px; display:none; }
  #gm-roster.active { display:block; }
  #gm-roster-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  #gm-frames { position:absolute; inset:0; display:none; }
  #gm-frames.active { display:block; }
  #gm-frames iframe { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; }
  #gm-frames iframe.active { display:block; }
  .gm-card { border:1px solid #111; border-left:3px solid #111; padding:10px 12px; background:#fff; display:flex; flex-direction:column; gap:6px; }
  .gm-card-head { display:flex; align-items:baseline; gap:8px; }
  .gm-card-name { font-family:var(--head); font-size:15px; letter-spacing:1px; }
  .gm-card-role { font-size:11px; color:#666; text-transform:uppercase; }
  .gm-card-stats { font-size:11px; color:#444; line-height:1.5; }
  .gm-card-actions { display:flex; gap:6px; margin-top:2px; flex-wrap:wrap; }
  .gm-card-id { font-size:9px; color:#bbb; word-break:break-all; }
  .gm-btn { font-family:var(--mono); font-size:12px; padding:4px 9px; border:1px solid #111; background:#fff; color:#111; cursor:pointer; text-decoration:none; display:inline-block; }
  .gm-btn:hover { background:#111; color:#fff; }
  .gm-empty { color:#888; font-style:italic; }
  /* in-app modal (Electron has no window.prompt) */
  .gm-modal-ov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:center; justify-content:center; }
  .gm-modal { background:#fff; border:3px solid #111; width:380px; max-width:92vw; }
  .gm-modal-head { background:#111; color:#fff; font-family:var(--head); letter-spacing:2px; text-transform:uppercase; font-size:13px; padding:9px 13px; }
  .gm-modal-input { width:100%; box-sizing:border-box; margin:12px 0 0; padding:8px 10px; border:1px solid #111; font-family:var(--mono); font-size:14px; }
  .gm-modal-input { width:calc(100% - 26px); margin:12px 13px 0; }
  .gm-modal-actions { display:flex; justify-content:flex-end; gap:8px; padding:12px 13px; }
  .gm-modal-ok { background:#111; color:#fff; }
</style>
</head>
<body>
<div id="gm-nav">
  <h1>GM DASHBOARD</h1>
  <span class="sub">Rache Bartmoss' Datafort · live</span>
  <span id="gm-status" class="gm-status">offline</span>
</div>
<div id="gm-bar">
  <span class="gm-campaign-lbl">CAMPAIGN: <span id="gm-campaign">main</span></span>
  <button class="gm-btn" onclick="gmNewSheet()">+ New sheet</button>
  <span id="gm-share"></span>
</div>
<div id="gm-tabs"></div>
<div id="gm-content">
  <div id="gm-roster" class="active"><div id="gm-roster-grid"></div></div>
  <div id="gm-frames"></div>
</div>

<script src="js/sync.bundle.js"></script>
<script src="js/gm.js"></script>
</body>
</html>
