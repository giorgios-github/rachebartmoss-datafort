name: Build GM Hub (Electron)

# Push a tag like v0.1.0 to build mac/win/linux installers and publish them
# to a GitHub Release. The site's Download buttons point to /releases/latest.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the browser sync bundle (vite) at the repo root.
      - run: npm install
      - run: npm run build:sync

      # Build + package the Electron app (explicit steps — no ambiguous arg passing).
      - working-directory: desktop
        run: npm install
      - working-directory: desktop
        run: npm run build:hub          # esbuild ../hub/createHub.mjs -> hub.bundle.cjs
      - working-directory: desktop
        run: npm run build:site         # copies the (already built) site into desktop/site
      - name: Package & publish
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds on CI: don't let electron-builder try to codesign.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx --no-install electron-builder --publish always
