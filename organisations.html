<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rache Bartmoss' Datafort — Organisations</title>
<link rel="icon" href="img/favicon.ico">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/organisations.css">
<!-- <link rel="stylesheet" href="css/themes.css"> -->
</head>
<body>
<div id="topnav" style="justify-content:space-between;">
  <h1 class="title" style="margin:0;padding:0;font-size:17px;letter-spacing:4px;">ORGANISATIONS</h1>
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="btn btn-sm" onclick="newOrg()">+ New</button>
    <button class="btn btn-sm" onclick="document.getElementById('org-import-input').click()">Import JSON</button>
    <input type="file" id="org-import-input" accept=".json" style="display:none" onchange="importOrgFile(event)">
  </div>
</div>

<div id="org-app">
  <!-- SIDEBAR -->
  <div id="org-sidebar">
    <div class="org-sidebar-search">
      <input id="org-search" placeholder="search organisations..." oninput="renderSidebar()" autocomplete="off">
    </div>
    <div id="org-sidebar-list"></div>
  </div>

  <!-- MAIN -->
  <div id="org-main">
    <div class="org-welcome">
      <div class="org-welcome-icon">⬡</div>
      <div class="org-welcome-title">ORGANISATIONS</div>
      <div class="org-welcome-sub">Create a new org or import a JSON file.</div>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="char-sheet-import" accept=".json" style="display:none">
<input type="file" id="org-logo-input" accept="image/*" style="display:none" onchange="orgLogoUpload(event)">

<!-- <script src="js/theme.js"></script> -->
<script src="js/organisations.js?v=20260525c"></script>
</body>
</html>
